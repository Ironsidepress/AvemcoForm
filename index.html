<!DOCTYPE html>
<html>
<head>
  <title>Aircraft Insurance Quote</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-wrap">
  <h2>Get an Insurance Quote from AVEMCO</h2>

  <form id="quoteForm">
    <input type="text" placeholder="First Name" required>
    <input type="text" placeholder="Last Name" required>
    <input type="tel" placeholder="Phone Number" required>
    <input type="email" placeholder="Email Address" required>
    <input type="text" placeholder="Base Airport (Identifier)">
    <input type="number" placeholder="Aircraft Year">
    <input type="text" placeholder="Aircraft Make">
    <input type="text" placeholder="Aircraft Model">
    <input type="number" placeholder="Value Requested">

    <button type="submit">Get Quote</button>
  </form>
</div>

</body>
</html>
